name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint
        run: ruff check --select F .

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Integration placeholder
        run: python -m unittest tests.integration.test_workflows
      - name: Integration example
        run: python -m examples.stdio_loop < /dev/null

  compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compatibility placeholder
        run: BLENDER_VERSION=4.0 python "scripts/check_compatibility.py"
