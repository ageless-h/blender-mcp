name: Version Tag

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'src/blender_mcp/__init__.py'

jobs:
  tag:
    runs-on: ubuntu-latest
    if: github.repository == 'ageless-h/blender-mcp'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for version change
        id: version
        run: |
          if git diff HEAD~1 HEAD -- src/blender_mcp/__init__.py | grep -q "__version__"; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Check if tag exists
        if: steps.version.outputs.version_changed == 'true'
        id: check_tag
        run: |
          VERSION=$(grep '__version__' src/blender_mcp/__init__.py | sed 's/.*"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git tag -l "v$VERSION" | grep -q .; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          fi
      - name: Create tag
        if: steps.version.outputs.version_changed == 'true' && steps.check_tag.outputs.tag_exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.check_tag.outputs.version }}" -m "Release v${{ steps.check_tag.outputs.version }}"
          git push origin "v${{ steps.check_tag.outputs.version }}"
