[project]
name = "blender-mcp"
version = "0.1.0"
description = "Blender MCP server and addon"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = [
  "ruff>=0.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/blender_mcp"]

[tool.pyright]
extraPaths = ["src"]
